name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install PSScriptAnalyzer
        run: sudo pwsh -Command "Install-Module -Name PSScriptAnalyzer -Force -Scope AllUsers"
      - name: Run analysis
        run: pwsh -Command "Invoke-ScriptAnalyzer -Path src/ -Recurse -Severity Error"
